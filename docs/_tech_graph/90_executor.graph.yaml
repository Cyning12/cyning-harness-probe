graph_id: "90_executor"
title: "真实执行器与安全校验"
description: "SubprocessExecutor + CommandSafetyChecker + 执行日志"
version: "2026-06-30"
direction: "TD"

nodes:
  - id: "EXECUTOR"
    label: "SubprocessExecutor"
    kind: service
  - id: "SAFETY"
    label: "CommandSafetyChecker"
    kind: service
  - id: "SAFETY_CONFIG"
    label: "SafetyConfig / SafetyMode"
    kind: data
  - id: "EXECUTION_LOG"
    label: "execution_log_*.jsonl"
    kind: storage
  - id: "MODELS"
    label: "ExecutionResult"
    kind: data

edges:
  - from: "EXECUTOR"
    to: "SAFETY"
    label: "check(cmd)"
    anchors:
      - path: "harness_sdk/executor.py"
        symbol: "run"
  - from: "SAFETY"
    to: "SAFETY_CONFIG"
    label: "配置模式/白名单/黑名单"
    anchors:
      - path: "harness_sdk/safety.py"
        symbol: "SafetyConfig"
  - from: "EXECUTOR"
    to: "EXECUTION_LOG"
    label: "append JSONL"
    anchors:
      - path: "harness_sdk/executor.py"
        symbol: "_log_event"
  - from: "EXECUTOR"
    to: "MODELS"
    label: "return ExecutionResult"
